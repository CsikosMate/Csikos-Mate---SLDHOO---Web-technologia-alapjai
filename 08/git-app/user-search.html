<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git App - Felhasználó kereső</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Felhasználó keresés</h1>

    <input type="text" id="user-search-input" placeholder="Felhasználó neve">
    <button class="btn btn-primary" id="search-btn">Keresés</button>

    <div id="result"></div>

    <script src="app.js"></script>
    <script>
        async function loadUsers(searchText) {
            try {
                const res = await fetch('https://api.github.com/search/users?q=' + encodeURIComponent(searchText), {
                    headers: {
                        'Authorization': 'Bearer' + GH_ACCESS_TOKEN
                    }
                });
                if (!res.ok) {
                    throw Error('Hibás válasz, státuszkód: ' + res.status);
                }

                const data = await res.json();

                const resultDiv = document.querySelector('#result');
                resultDiv.innerHTML = '';

                for (const repo of data.items) {
                    const repoHtml = `
                    <div class="card">
                        <p>${repo.login}</p>
                        <img src="${repo.avatar_url}" style="width: 350px;">
                    </div>
                    `;
                    resultDiv.innerHTML += repoHtml;
                }

                console.log(data);

            } catch (err) {
                console.error(err);
                alert('Hiba történt a keresés során.');
            }
        }

        const searchBtn = document.querySelector('#search-btn');
        searchBtn.addEventListener('click', () => {
            const inputElem = document.querySelector('#user-search-input');
            const searchText = inputElem.value;

            if (searchText === '') {
                alert('A mező kitöltetlen maradt!')
            } else {
                loadUsers(searchText);
            }
        });
    </script>
</body>
</html>
